          \            \"question\": q,\n            \"student_answer\": student_answer,\n\
          \            \"student_score\": grade[\"score\"],\n            \"reason\"\
          : grade.get(\"reason\", \"\"),\n        })\n        time.sleep(3)\n\n  \
          \  student_scores = [r[\"student_score\"] for r in results if isinstance(r.get(\"\
          student_score\"), (int, float))]\n    student_avg = sum(student_scores)\
          \ / len(student_scores) if student_scores else 0.0\n\n    # Teacher baseline\
          \ -- same questions, Teacher answers, then self-grade\n    print(\"\\n\"\
          \ + \"=\" * 60)\n    print(\"TEACHER BASELINE\")\n    print(\"=\" * 60)\n\
          \    for i, r in enumerate(results):\n        q = r[\"question\"]\n    \
          \    teacher_answer = query_teacher(q)\n        teacher_grade_result = teacher_grade(q,\
          \ teacher_answer)\n        r[\"teacher_answer\"] = teacher_answer\n    \
          \    r[\"teacher_score\"] = teacher_grade_result[\"score\"]\n        print(f\"\
          \  Q{i+1}: {teacher_grade_result['score']}/10\")\n        time.sleep(3)\n\
          \n    teacher_scores = [r[\"teacher_score\"] for r in results if isinstance(r.get(\"\
          teacher_score\"), (int, float))]\n    teacher_avg = sum(teacher_scores)\
          \ / len(teacher_scores) if teacher_scores else 0.0\n\n    print(\"\\n\"\
          \ + \"=\" * 60)\n    print(\"FINAL RESULTS\")\n    print(\"=\" * 60)\n \
          \   for i, r in enumerate(results):\n        print(f\"  Q{i+1}: student={r['student_score']}/10\
          \  teacher={r['teacher_score']}/10 -- {r.get('reason', '')}\")\n    print(f\"\
          \\n  Student Avg: {student_avg:.2f}/10\")\n    print(f\"  Teacher Avg: {teacher_avg:.2f}/10\"\
          )\n    print(f\"  Score Gap:   {teacher_avg - student_avg:.2f}\")\n    print(\"\
          =\" * 60)\n\n    # Log to MLflow\n    if mlflow_tracking_uri:\n        mlflow.set_tracking_uri(mlflow_tracking_uri)\n\
          \        mlflow.set_experiment(\"CodeReview-Eval-Hub\")\n        with mlflow.start_run(run_name=f\"\
          pipeline-eval-{model_version}\"):\n            mlflow.set_tag(\"model_version\"\
          , model_version)\n            mlflow.set_tag(\"eval_type\", \"pipeline_benchmark\"\
          )\n            mlflow.log_metric(\"student_avg_score\", round(student_avg,\
          \ 4))\n            mlflow.log_metric(\"teacher_avg_score\", round(teacher_avg,\
          \ 4))\n            mlflow.log_metric(\"score_gap\", round(teacher_avg -\
          \ student_avg, 4))\n            for i, r in enumerate(results):\n      \
          \          mlflow.log_metric(f\"q{i+1}_student_score\", r[\"student_score\"\
