# PIPELINE DEFINITION
# Name: distillation-flywheel
# Description: SFT + DPO distillation flywheel: extract gold, SFT, extract preferences, DPO, deploy, evaluate.
# Inputs:
#    dpo_beta: float [Default: 0.1]
#    dpo_epochs: int [Default: 1.0]
#    groq_api_key: str [Default: '']
#    groq_model: str [Default: 'llama-3.3-70b-versatile']
#    max_supplement_questions: int [Default: 50.0]
#    min_dpo_pairs: int [Default: 5.0]
#    min_gold_threshold: int [Default: 0.0]
#    model_version: str [Default: '']
#    num_epochs: int [Default: 3.0]
#    s3_access_key: str [Default: 'minioadmin']
#    s3_secret_key: str [Default: 'minioadmin123']
components:
  comp-deploy-model:
    executorLabel: exec-deploy-model
    inputDefinitions:
      parameters:
        isvc_name:
          parameterType: STRING
        model_s3_path:
          parameterType: STRING
        namespace:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-dpo-finetune:
    executorLabel: exec-dpo-finetune
    inputDefinitions:
      parameters:
        batch_size:
          defaultValue: 2.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        dpo_beta:
          defaultValue: 0.1
          isOptional: true
          parameterType: NUMBER_DOUBLE
        learning_rate:
          defaultValue: 5.0e-05
          isOptional: true
          parameterType: NUMBER_DOUBLE
        lora_alpha:
          defaultValue: 32.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        lora_r:
          defaultValue: 16.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        min_pairs:
          defaultValue: 5.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        model_version:
          parameterType: STRING
        num_epochs:
          defaultValue: 1.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        pref_data_s3_path:
          parameterType: STRING
        s3_access_key:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        s3_secret_key:
          parameterType: STRING
        sft_model_s3_path:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-evaluate:
    executorLabel: exec-evaluate
    inputDefinitions:
      parameters:
        groq_api_key:
          parameterType: STRING
        groq_model:
          parameterType: STRING
        mlflow_tracking_uri:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        model_version:
          defaultValue: unknown
          isOptional: true
          parameterType: STRING
        s3_access_key:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        s3_endpoint:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        s3_secret_key:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        student_url:
          parameterType: STRING
        test_questions:
          parameterType: LIST
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRUCT
  comp-extract-gold-data:
    executorLabel: exec-extract-gold-data
    inputDefinitions:
      parameters:
        cursor_key:
          parameterType: STRING
        min_threshold:
          defaultValue: 0.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        output_s3_path:
          parameterType: STRING
        s3_access_key:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        s3_secret_key:
          parameterType: STRING
        synthetic_bucket:
          parameterType: STRING
        synthetic_prefix:
          parameterType: STRING
        teacher_bucket:
          parameterType: STRING
        teacher_prefix:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-extract-preferences:
    executorLabel: exec-extract-preferences
    inputDefinitions:
      parameters:
        groq_api_key:
          parameterType: STRING
        groq_model:
          parameterType: STRING
        max_supplement_questions:
          defaultValue: 50.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        min_score_gap:
          defaultValue: 2.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        mlflow_tracking_uri:
          parameterType: STRING
        model_version:
          parameterType: STRING
        pref_output_bucket:
          defaultValue: mlflow-artifacts
          isOptional: true
          parameterType: STRING
        question_bank_s3_path:
          parameterType: STRING
        s3_access_key:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        s3_secret_key:
          parameterType: STRING
        sft_run_name_prefix:
          parameterType: STRING
        student_url:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-finetune:
    executorLabel: exec-finetune
    inputDefinitions:
      parameters:
        base_model_id:
          parameterType: STRING
        batch_size:
          defaultValue: 4.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        gold_data_path:
          parameterType: STRING
        learning_rate:
          defaultValue: 0.0002
          isOptional: true
          parameterType: NUMBER_DOUBLE
        lora_alpha:
          defaultValue: 32.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        lora_r:
          defaultValue: 16.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        model_output_s3_path:
          parameterType: STRING
        num_epochs:
          defaultValue: 3.0
          isOptional: true
          parameterType: NUMBER_INTEGER
        s3_access_key:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        s3_secret_key:
          parameterType: STRING
    outputDefinitions:
      parameters:
        Output:
          parameterType: STRING
  comp-resolve-version:
    executorLabel: exec-resolve-version
    inputDefinitions:
      parameters:
        explicit_version:
          defaultValue: ''
          isOptional: true
          parameterType: STRING
        gold_bucket:
          parameterType: STRING
        model_bucket:
          parameterType: STRING
        model_prefix:
          parameterType: STRING
        s3_access_key:
          parameterType: STRING
        s3_endpoint:
          parameterType: STRING
        s3_secret_key:
          parameterType: STRING
    outputDefinitions:
      parameters:
        gold_data_path:
          parameterType: STRING
        model_output_path:
          parameterType: STRING
        version:
          parameterType: STRING
deploymentSpec:
  executors:
    exec-deploy-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes==32.0.1'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_model(\n    model_s3_path: str,\n    isvc_name: str,\n\
          \    namespace: str,\n) -> str:\n    \"\"\"Patch InferenceService storageUri\
          \ and wait for Ready.\"\"\"\n    import time\n    from kubernetes import\
          \ client, config\n\n    config.load_incluster_config()\n\n    custom_api\
          \ = client.CustomObjectsApi()\n    group = \"serving.kserve.io\"\n    version\
          \ = \"v1beta1\"\n    plural = \"inferenceservices\"\n\n    storage_uri =\
          \ model_s3_path\n    if not storage_uri.startswith(\"s3://\"):\n       \
          \ storage_uri = f\"s3://{storage_uri}\"\n    if not storage_uri.endswith(\"\
          /\"):\n        storage_uri += \"/\"\n\n    patch_body = {\n        \"spec\"\
          : {\n            \"predictor\": {\n                \"model\": {\n      \
          \              \"storageUri\": storage_uri,\n                }\n       \
          \     }\n        }\n    }\n\n    print(f\"Patching {isvc_name} storageUri\
          \ -> {storage_uri}\")\n    custom_api.patch_namespaced_custom_object(\n\
          \        group=group,\n        version=version,\n        namespace=namespace,\n\
          \        plural=plural,\n        name=isvc_name,\n        body=patch_body,\n\
          \    )\n\n    # Give the controller time to start the rollout before polling\n\
          \    print(\"Waiting 30s for rollout to begin...\")\n    time.sleep(30)\n\
          \n    # Wait for the ISVC to become Ready with the NEW storageUri (up to\
          \ 10 min)\n    timeout = 600\n    poll_interval = 15\n    elapsed = 0\n\n\
          \    while elapsed < timeout:\n        isvc = custom_api.get_namespaced_custom_object(\n\
          \            group=group,\n            version=version,\n            namespace=namespace,\n\
          \            plural=plural,\n            name=isvc_name,\n        )\n\n\
          \        # Confirm the storageUri was actually updated\n        current_uri\
          \ = (\n            isvc.get(\"spec\", {})\n            .get(\"predictor\"\
          , {})\n            .get(\"model\", {})\n            .get(\"storageUri\"\
          , \"\")\n        )\n        conditions = isvc.get(\"status\", {}).get(\"\
          conditions\", [])\n        ready = any(\n            c.get(\"type\") ==\
          \ \"Ready\" and c.get(\"status\") == \"True\"\n            for c in conditions\n\
          \        )\n\n        if ready and current_uri == storage_uri:\n       \
          \     url = isvc.get(\"status\", {}).get(\"url\", \"\")\n            print(f\"\
          InferenceService {isvc_name} is Ready with new model: {url}\")\n       \
          \     svc_url = f\"http://{isvc_name}-predictor.{namespace}.svc.cluster.local:8080\"\
          \n\n            # Extra wait for vLLM to finish loading the model into GPU\
          \ memory\n            print(\"Waiting 60s for vLLM to fully initialize...\"\
          )\n            time.sleep(60)\n            return svc_url\n\n        status_msg\
          \ = f\"ready={ready}, storageUri matches={current_uri == storage_uri}\"\n\
          \        print(f\"Waiting for {isvc_name}... ({elapsed}s/{timeout}s) [{status_msg}]\"\
          )\n        time.sleep(poll_interval)\n        elapsed += poll_interval\n\
          \n    raise TimeoutError(\n        f\"InferenceService {isvc_name} did not\
          \ become Ready within {timeout}s\"\n    )\n\n"
        image: python:3.11-slim
    exec-dpo-finetune:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - dpo_finetune
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes==31.0.0'\
          \ 'boto3'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef dpo_finetune(\n    sft_model_s3_path: str,\n    pref_data_s3_path:\
          \ str,\n    model_version: str,\n    s3_endpoint: str,\n    s3_access_key:\
          \ str,\n    s3_secret_key: str,\n    num_epochs: int = 1,\n    batch_size:\
          \ int = 2,\n    learning_rate: float = 5e-5,\n    lora_r: int = 16,\n  \
          \  lora_alpha: int = 32,\n    dpo_beta: float = 0.1,\n    min_pairs: int\
          \ = 5,\n) -> str:\n    \"\"\"Submit a Kubeflow TrainJob for DPO training\
          \ on preference data.\"\"\"\n    import time\n\n    import boto3\n    from\
          \ kubernetes import client, config\n\n    model_output_s3_path = f\"s3://sridhar-models/student-1b-{model_version}-dpo/\"\
          \n\n    s3 = boto3.client(\n        \"s3\",\n        endpoint_url=s3_endpoint,\n\
          \        aws_access_key_id=s3_access_key,\n        aws_secret_access_key=s3_secret_key,\n\
          \    )\n\n    parts = pref_data_s3_path.replace(\"s3://\", \"\").split(\"\
          /\", 1)\n    obj = s3.get_object(Bucket=parts[0], Key=parts[1])\n    lines\
          \ = [l for l in obj[\"Body\"].read().decode().strip().split(\"\\n\") if\
          \ l.strip()]\n    num_pref_pairs = len(lines)\n\n    print(f\"Preference\
          \ data has {num_pref_pairs} pairs (min_pairs={min_pairs})\")\n    if num_pref_pairs\
          \ < min_pairs:\n        print(f\"Fewer than {min_pairs} preference pairs\
          \ -- skipping DPO, passing through SFT model\")\n        return sft_model_s3_path\n\
          \n    config.load_incluster_config()\n    custom_api = client.CustomObjectsApi()\n\
          \n    namespace = \"sridharproject\"\n    job_name = f\"dpo-{int(time.time())}\"\
          \n    image = \"quay.io/rh-ee-srpillai/distillation-trainer:v0.2.0\"\n\n\
          \    trainjob = {\n        \"apiVersion\": \"trainer.kubeflow.org/v1alpha1\"\
          ,\n        \"kind\": \"TrainJob\",\n        \"metadata\": {\n          \
          \  \"name\": job_name,\n            \"namespace\": namespace,\n        },\n\
          \        \"spec\": {\n            \"runtimeRef\": {\n                \"\
          name\": \"torch-distributed\",\n            },\n            \"trainer\"\
          : {\n                \"image\": image,\n                \"env\": [\n   \
          \                 {\"name\": \"TRAINING_MODE\", \"value\": \"dpo\"},\n \
          \                   {\"name\": \"PREF_DATA_PATH\", \"value\": pref_data_s3_path},\n\
          \                    {\"name\": \"BASE_MODEL_ID\", \"value\": sft_model_s3_path},\n\
          \                    {\"name\": \"MODEL_OUTPUT_S3_PATH\", \"value\": model_output_s3_path},\n\
          \                    {\"name\": \"NUM_EPOCHS\", \"value\": str(num_epochs)},\n\
          \                    {\"name\": \"BATCH_SIZE\", \"value\": str(batch_size)},\n\
          \                    {\"name\": \"LEARNING_RATE\", \"value\": str(learning_rate)},\n\
          \                    {\"name\": \"LORA_R\", \"value\": str(lora_r)},\n \
          \                   {\"name\": \"LORA_ALPHA\", \"value\": str(lora_alpha)},\n\
          \                    {\"name\": \"DPO_BETA\", \"value\": str(dpo_beta)},\n\
          \                    {\"name\": \"S3_ENDPOINT\", \"value\": s3_endpoint},\n\
          \                    {\"name\": \"S3_ACCESS_KEY\", \"value\": s3_access_key},\n\
          \                    {\"name\": \"S3_SECRET_KEY\", \"value\": s3_secret_key},\n\
          \                    {\"name\": \"CUDA_VISIBLE_DEVICES\", \"value\": \"\
          0\"},\n                ],\n                \"numNodes\": 1,\n          \
          \      \"resourcesPerNode\": {\n                    \"requests\": {\n  \
          \                      \"nvidia.com/gpu\": \"1\",\n                    \
          \    \"memory\": \"16Gi\",\n                        \"cpu\": \"4\",\n  \
          \                  },\n                    \"limits\": {\n             \
          \           \"nvidia.com/gpu\": \"1\",\n                        \"memory\"\
          : \"24Gi\",\n                        \"cpu\": \"8\",\n                 \
          \   },\n                },\n            },\n        },\n    }\n\n    custom_api.create_namespaced_custom_object(\n\
          \        group=\"trainer.kubeflow.org\",\n        version=\"v1alpha1\",\n\
          \        namespace=namespace,\n        plural=\"trainjobs\",\n        body=trainjob,\n\
          \    )\n    print(f\"Submitted DPO TrainJob {job_name}\")\n\n    poll_interval\
          \ = 30\n    timeout = 7200\n    elapsed = 0\n\n    while elapsed < timeout:\n\
          \        time.sleep(poll_interval)\n        elapsed += poll_interval\n\n\
          \        job = custom_api.get_namespaced_custom_object(\n            group=\"\
          trainer.kubeflow.org\",\n            version=\"v1alpha1\",\n           \
          \ namespace=namespace,\n            plural=\"trainjobs\",\n            name=job_name,\n\
          \        )\n\n        conditions = job.get(\"status\", {}).get(\"conditions\"\
          , [])\n        for condition in conditions:\n            ctype = condition.get(\"\
          type\")\n            if (ctype == \"Succeeded\" or ctype == \"Complete\"\
          ) and condition.get(\"status\") == \"True\":\n                print(f\"\
          DPO TrainJob {job_name} succeeded after {elapsed}s\")\n                return\
          \ model_output_s3_path\n            if ctype == \"Failed\" and condition.get(\"\
          status\") == \"True\":\n                msg = condition.get(\"message\"\
          , \"unknown error\")\n                try:\n                    core_api\
          \ = client.CoreV1Api()\n                    label = f\"batch.kubernetes.io/job-name={job_name}-node-0\"\
          \n                    pods = core_api.list_namespaced_pod(\n           \
          \             namespace=namespace,\n                        label_selector=label,\n\
          \                    )\n                    if pods.items:\n           \
          \             pod_name = pods.items[0].metadata.name\n                 \
          \       logs = core_api.read_namespaced_pod_log(\n                     \
          \       name=pod_name,\n                            namespace=namespace,\n\
          \                            container=\"node\",\n                     \
          \   )\n                        msg = f\"{msg}\\n\\n--- DPO pod {pod_name}\
          \ logs (last 100 lines) ---\\n\" + \"\\n\".join(logs.splitlines()[-100:])\n\
          \                except Exception as e:\n                    msg = f\"{msg}\
          \ (could not fetch pod logs: {e})\"\n                raise RuntimeError(f\"\
          DPO TrainJob {job_name} failed: {msg}\")\n\n        phase = job.get(\"status\"\
          , {}).get(\"phase\", \"Unknown\")\n        print(f\"DPO TrainJob {job_name}\
          \ still running (phase={phase}, elapsed={elapsed}s)\")\n\n    raise TimeoutError(f\"\
          DPO TrainJob {job_name} did not complete within {timeout}s\")\n\n"
        image: python:3.11-slim
    exec-evaluate:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - evaluate
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'requests' 'mlflow'\
          \ 'boto3'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef evaluate(\n    student_url: str,\n    groq_api_key: str,\n  \
          \  groq_model: str,\n    test_questions: list,\n    mlflow_tracking_uri:\
          \ str = \"\",\n    model_version: str = \"unknown\",\n    s3_endpoint: str\
          \ = \"\",\n    s3_access_key: str = \"\",\n    s3_secret_key: str = \"\"\
          ,\n) -> dict:\n    \"\"\"Send test questions to Student, have Teacher grade\
          \ responses, log to MLflow.\"\"\"\n    import json\n    import os\n    import\
          \ time\n    import requests\n    import mlflow\n\n    if mlflow_tracking_uri.startswith(\"\
          https://\"):\n        os.environ.setdefault(\"MLFLOW_TRACKING_INSECURE_TLS\"\
          , \"true\")\n\n    if s3_endpoint:\n        os.environ.setdefault(\"MLFLOW_S3_ENDPOINT_URL\"\
          , s3_endpoint)\n        if s3_endpoint.startswith(\"https://\"):\n     \
          \       os.environ.setdefault(\"MLFLOW_S3_IGNORE_TLS\", \"true\")\n    if\
          \ s3_access_key:\n        os.environ.setdefault(\"AWS_ACCESS_KEY_ID\", s3_access_key)\n\
          \    if s3_secret_key:\n        os.environ.setdefault(\"AWS_SECRET_ACCESS_KEY\"\
          , s3_secret_key)\n\n    if not groq_api_key:\n        raise ValueError(\n\
          \            \"groq_api_key is empty. Pass your Groq API key as a pipeline\
          \ parameter.\"\n        )\n\n    print(f\"Student URL: {student_url}\")\n\
          \    print(f\"Groq model: {groq_model}\")\n    print(f\"Test questions:\
          \ {len(test_questions)}\")\n    print(f\"Groq API key: set ({len(groq_api_key)}\
          \ chars)\")\n\n    GRADING_PROMPT = (\n        \"You are an expert grader.\
          \ Rate the following AI response to the given question \"\n        \"on\
          \ a scale of 1 to 10, where 1 is completely wrong and 10 is perfect. \"\n\
          \        'Respond with ONLY a JSON object: {\"score\": <number>, \"reason\"\
          : \"<brief reason>\"}'\n    )\n\n    def query_student(question: str, max_retries:\
          \ int = 10) -> str:\n        for attempt in range(max_retries):\n      \
          \      try:\n                resp = requests.post(\n                   \
          \ f\"{student_url}/v1/chat/completions\",\n                    json={\n\
          \                        \"model\": \"/mnt/models\",\n                 \
          \       \"messages\": [{\"role\": \"user\", \"content\": question}],\n \
          \                       \"max_tokens\": 256,\n                        \"\
          temperature\": 0.3,\n                    },\n                    timeout=90,\n\
          \                )\n                if resp.status_code in (404, 503):\n\
          \                    wait = min(15 * (attempt + 1), 60)\n              \
          \      print(f\"  [{attempt+1}/{max_retries}] HTTP {resp.status_code}, vLLM\
          \ not ready. Retry in {wait}s\")\n                    time.sleep(wait)\n\
          \                    continue\n                if not resp.ok:\n       \
          \             print(f\"  HTTP {resp.status_code} from student: {resp.text[:500]}\"\
          )\n                resp.raise_for_status()\n                return resp.json()[\"\
          choices\"][0][\"message\"][\"content\"]\n            except (requests.ConnectionError,\
          \ requests.Timeout) as e:\n                wait = min(15 * (attempt + 1),\
          \ 60)\n                print(f\"  [{attempt+1}/{max_retries}] Connection\
          \ error, retry in {wait}s: {e}\")\n                time.sleep(wait)\n  \
          \      raise RuntimeError(f\"Student unreachable after {max_retries} retries\"\
          )\n\n    def _groq_call(messages: list, max_tokens: int = 512, temperature:\
          \ float = 0.7) -> str:\n        \"\"\"Call Groq API with exponential backoff\
          \ on 429 rate limits.\"\"\"\n        for attempt in range(8):\n        \
          \    resp = requests.post(\n                \"https://api.groq.com/openai/v1/chat/completions\"\
          ,\n                headers={\n                    \"Authorization\": f\"\
          Bearer {groq_api_key}\",\n                    \"Content-Type\": \"application/json\"\
          ,\n                },\n                json={\n                    \"model\"\
          : groq_model,\n                    \"messages\": messages,\n           \
          \         \"max_tokens\": max_tokens,\n                    \"temperature\"\
          : temperature,\n                },\n                timeout=60,\n      \
