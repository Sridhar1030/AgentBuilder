          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef finetune(\n    gold_data_path: str,\n    model_output_s3_path:\
          \ str,\n    base_model_id: str,\n    s3_endpoint: str,\n    s3_access_key:\
          \ str,\n    s3_secret_key: str,\n    num_epochs: int = 3,\n    batch_size:\
          \ int = 4,\n    learning_rate: float = 2e-4,\n    lora_r: int = 16,\n  \
          \  lora_alpha: int = 32,\n) -> str:\n    \"\"\"Submit a Kubeflow TrainJob\
          \ for QLoRA training and wait for completion.\"\"\"\n    import time\n\n\
          \    from kubernetes import client, config\n\n    config.load_incluster_config()\n\
          \    custom_api = client.CustomObjectsApi()\n\n    namespace = \"sridharproject\"\
          \n    job_name = f\"finetune-{int(time.time())}\"\n    image = \"quay.io/rh-ee-srpillai/distillation-trainer:v0.1.0\"\
          \n\n    trainjob = {\n        \"apiVersion\": \"trainer.kubeflow.org/v1alpha1\"\
          ,\n        \"kind\": \"TrainJob\",\n        \"metadata\": {\n          \
          \  \"name\": job_name,\n            \"namespace\": namespace,\n        },\n\
          \        \"spec\": {\n            \"runtimeRef\": {\n                \"\
          name\": \"torch-distributed\",\n            },\n            \"trainer\"\
          : {\n                \"image\": image,\n                \"env\": [\n   \
          \                 {\"name\": \"GOLD_DATA_PATH\", \"value\": gold_data_path},\n\
          \                    {\"name\": \"MODEL_OUTPUT_S3_PATH\", \"value\": model_output_s3_path},\n\
          \                    {\"name\": \"BASE_MODEL_ID\", \"value\": base_model_id},\n\
          \                    {\"name\": \"NUM_EPOCHS\", \"value\": str(num_epochs)},\n\
          \                    {\"name\": \"BATCH_SIZE\", \"value\": str(batch_size)},\n\
          \                    {\"name\": \"LEARNING_RATE\", \"value\": str(learning_rate)},\n\
          \                    {\"name\": \"LORA_R\", \"value\": str(lora_r)},\n \
          \                   {\"name\": \"LORA_ALPHA\", \"value\": str(lora_alpha)},\n\
          \                    {\"name\": \"S3_ENDPOINT\", \"value\": s3_endpoint},\n\
          \                    {\"name\": \"S3_ACCESS_KEY\", \"value\": s3_access_key},\n\
          \                    {\"name\": \"S3_SECRET_KEY\", \"value\": s3_secret_key},\n\
          \                    {\"name\": \"CUDA_VISIBLE_DEVICES\", \"value\": \"\
          0\"},\n                ],\n                \"numNodes\": 1,\n          \
          \      \"resourcesPerNode\": {\n                    \"requests\": {\n  \
          \                      \"nvidia.com/gpu\": \"1\",\n                    \
          \    \"memory\": \"16Gi\",\n                        \"cpu\": \"4\",\n  \
          \                  },\n                    \"limits\": {\n             \
          \           \"nvidia.com/gpu\": \"1\",\n                        \"memory\"\
          : \"24Gi\",\n                        \"cpu\": \"8\",\n                 \
          \   },\n                },\n            },\n        },\n    }\n\n    custom_api.create_namespaced_custom_object(\n\
          \        group=\"trainer.kubeflow.org\",\n        version=\"v1alpha1\",\n\
          \        namespace=namespace,\n        plural=\"trainjobs\",\n        body=trainjob,\n\
          \    )\n    print(f\"Submitted TrainJob {job_name}\")\n\n    # Poll until\
          \ Succeeded or Failed\n    poll_interval = 30\n    timeout = 7200  # 2 hours\
          \ max\n    elapsed = 0\n\n    while elapsed < timeout:\n        time.sleep(poll_interval)\n\
          \        elapsed += poll_interval\n\n        job = custom_api.get_namespaced_custom_object(\n\
          \            group=\"trainer.kubeflow.org\",\n            version=\"v1alpha1\"\
          ,\n            namespace=namespace,\n            plural=\"trainjobs\",\n\
          \            name=job_name,\n        )\n\n        conditions = job.get(\"\
          status\", {}).get(\"conditions\", [])\n        for condition in conditions:\n\
          \            ctype = condition.get(\"type\")\n            if (ctype == \"\
          Succeeded\" or ctype == \"Complete\") and condition.get(\"status\") == \"\
          True\":\n                print(f\"TrainJob {job_name} succeeded after {elapsed}s\"\
          )\n                return model_output_s3_path\n            if ctype ==\
          \ \"Failed\" and condition.get(\"status\") == \"True\":\n              \
          \  msg = condition.get(\"message\", \"unknown error\")\n               \
          \ # Try to get training pod logs so the real error is visible\n        \
          \        try:\n                    core_api = client.CoreV1Api()\n     \
          \               label = f\"batch.kubernetes.io/job-name={job_name}-node-0\"\
          \n                    pods = core_api.list_namespaced_pod(\n           \
          \             namespace=namespace,\n                        label_selector=label,\n\
          \                    )\n                    if pods.items:\n           \
          \             pod_name = pods.items[0].metadata.name\n                 \
          \       logs = core_api.read_namespaced_pod_log(\n                     \
          \       name=pod_name,\n                            namespace=namespace,\n\
          \                            container=\"node\",\n                     \
          \   )\n                        msg = f\"{msg}\\n\\n--- Training pod {pod_name}\
          \ logs (last 100 lines) ---\\n\" + \"\\n\".join(logs.splitlines()[-100:])\n\
          \                except Exception as e:\n                    msg = f\"{msg}\
          \ (could not fetch pod logs: {e})\"\n                raise RuntimeError(f\"\
          TrainJob {job_name} failed: {msg}\")\n\n        phase = job.get(\"status\"\
          , {}).get(\"phase\", \"Unknown\")\n        print(f\"TrainJob {job_name}\
          \ still running (phase={phase}, elapsed={elapsed}s)\")\n\n    raise TimeoutError(f\"\
          TrainJob {job_name} did not complete within {timeout}s\")\n\n"
        image: python:3.11-slim
    exec-resolve-version:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - resolve_version
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'boto3'  && \
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef resolve_version(\n    s3_endpoint: str,\n    s3_access_key: str,\n\
          \    s3_secret_key: str,\n    model_bucket: str,\n    model_prefix: str,\n\
          \    gold_bucket: str,\n    explicit_version: str = \"\",\n) -> NamedTuple(\"\
          VersionOutputs\", [(\"version\", str), (\"gold_data_path\", str), (\"model_output_path\"\
          , str)]):\n    \"\"\"Find the latest student-1b-vN/ in MinIO and return\
          \ vN+1 with paths.\"\"\"\n    import re\n    from collections import namedtuple\n\
          \    import boto3\n\n    s3 = boto3.client(\n        \"s3\",\n        endpoint_url=s3_endpoint,\n\
          \        aws_access_key_id=s3_access_key,\n        aws_secret_access_key=s3_secret_key,\n\
          \    )\n\n    if explicit_version:\n        version = explicit_version\n\
          \        print(f\"Using explicit version: {version}\")\n    else:\n    \
          \    paginator = s3.get_paginator(\"list_objects_v2\")\n        version_numbers\
          \ = []\n\n        for page in paginator.paginate(Bucket=model_bucket, Prefix=model_prefix,\
          \ Delimiter=\"/\"):\n            for cp in page.get(\"CommonPrefixes\",\
          \ []):\n                folder = cp[\"Prefix\"]\n                match =\
          \ re.search(r\"-v(\\d+)/?$\", folder)\n                if match:\n     \
          \               version_numbers.append(int(match.group(1)))\n\n        if\
          \ version_numbers:\n            latest = max(version_numbers)\n        \
          \    version = f\"v{latest + 1}\"\n            print(f\"Found versions:\
          \ {sorted(version_numbers)}. Latest: v{latest}. Next: {version}\")\n   \
          \     else:\n            version = \"v1\"\n            print(f\"No existing\
          \ versions found under {model_bucket}/{model_prefix}. Starting at {version}\"\
          )\n\n    gold_data_path = f\"s3://{gold_bucket}/gold/train-{version}.jsonl\"\
          \n    model_output_path = f\"s3://{model_bucket}/{model_prefix}{version}/\"\
          \n\n    print(f\"Version: {version}\")\n    print(f\"Gold data path: {gold_data_path}\"\
          )\n    print(f\"Model output path: {model_output_path}\")\n\n    Outputs\
          \ = namedtuple(\"VersionOutputs\", [\"version\", \"gold_data_path\", \"\
          model_output_path\"])\n    return Outputs(version=version, gold_data_path=gold_data_path,\
          \ model_output_path=model_output_path)\n\n"
        image: python:3.11-slim
pipelineInfo:
  description: 'SFT + DPO distillation flywheel: extract gold, SFT, extract preferences,
    DPO, deploy, evaluate.'
  name: distillation-flywheel
root:
  dag:
    tasks:
      deploy-model:
        cachingOptions: {}
        componentRef:
          name: comp-deploy-model
        dependentTasks:
        - dpo-finetune
        inputs:
          parameters:
            isvc_name:
              runtimeValue:
                constant: student-llm
            model_s3_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: dpo-finetune
            namespace:
              runtimeValue:
                constant: sridharproject
        taskInfo:
          name: deploy-model
      dpo-finetune:
        cachingOptions: {}
        componentRef:
          name: comp-dpo-finetune
        dependentTasks:
        - extract-preferences
        - finetune
        - resolve-version
        inputs:
          parameters:
            dpo_beta:
              componentInputParameter: dpo_beta
            min_pairs:
              componentInputParameter: min_dpo_pairs
            model_version:
              taskOutputParameter:
                outputParameterKey: version
                producerTask: resolve-version
            num_epochs:
              componentInputParameter: dpo_epochs
            pref_data_s3_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: extract-preferences
            s3_access_key:
              componentInputParameter: s3_access_key
            s3_endpoint:
              runtimeValue:
                constant: http://minio.sridharproject.svc.cluster.local:9000
            s3_secret_key:
              componentInputParameter: s3_secret_key
            sft_model_s3_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: finetune
        taskInfo:
          name: dpo-finetune
      evaluate:
        cachingOptions: {}
        componentRef:
          name: comp-evaluate
        dependentTasks:
        - deploy-model
        - resolve-version
        inputs:
          parameters:
            groq_api_key:
              componentInputParameter: groq_api_key
            groq_model:
              componentInputParameter: groq_model
            mlflow_tracking_uri:
              runtimeValue:
                constant: http://mlflow.sridharproject.svc.cluster.local:5000
            model_version:
              taskOutputParameter:
                outputParameterKey: version
                producerTask: resolve-version
            s3_access_key:
              componentInputParameter: s3_access_key
            s3_endpoint:
              runtimeValue:
                constant: http://minio.sridharproject.svc.cluster.local:9000
            s3_secret_key:
              componentInputParameter: s3_secret_key
            student_url:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: deploy-model
            test_questions:
              runtimeValue:
                constant:
                - What is knowledge distillation and why is it useful?
                - Explain the difference between LoRA and full fine-tuning.
                - How does QLoRA reduce memory usage during training?
                - What are the advantages of smaller language models in production?
                - Describe the role of a teacher model in model compression.
                - What is a KFP component and how do you create one with the Python
                  SDK?
                - How do you pass artifacts between components in a Kubeflow pipeline?
                - Explain the difference between PyTorchJob and TrainJob in the Training
                  Operator.
                - How do you configure multi-node distributed training with the Training
                  Operator?
                - How does KServe handle canary deployments for ML models?
                - What is the difference between Serverless and RawDeployment mode
                  in KServe?
                - What search algorithms does Katib support for hyperparameter tuning?
                - How do you define the search space for a Katib experiment?
                - How do you set up multi-tenancy in Kubeflow using profiles?
                - What are the core components of a Kubeflow deployment?
        taskInfo:
          name: evaluate
      extract-gold-data:
        cachingOptions: {}
        componentRef:
          name: comp-extract-gold-data
        dependentTasks:
        - resolve-version
        inputs:
          parameters:
            cursor_key:
              runtimeValue:
                constant: teacher-interactions/.cursor.json
            min_threshold:
              componentInputParameter: min_gold_threshold
            output_s3_path:
              taskOutputParameter:
                outputParameterKey: gold_data_path
                producerTask: resolve-version
            s3_access_key:
              componentInputParameter: s3_access_key
            s3_endpoint:
              runtimeValue:
                constant: http://minio.sridharproject.svc.cluster.local:9000
            s3_secret_key:
              componentInputParameter: s3_secret_key
            synthetic_bucket:
              runtimeValue:
                constant: mlflow-artifacts
            synthetic_prefix:
              runtimeValue:
                constant: synthetic/
            teacher_bucket:
              runtimeValue:
                constant: mlflow-artifacts
            teacher_prefix:
              runtimeValue:
                constant: teacher-interactions/
        taskInfo:
          name: extract-gold-data
      extract-preferences:
        cachingOptions: {}
        componentRef:
          name: comp-extract-preferences
        dependentTasks:
        - finetune
        - resolve-version
        inputs:
          parameters:
            groq_api_key:
              componentInputParameter: groq_api_key
            groq_model:
              componentInputParameter: groq_model
            max_supplement_questions:
              componentInputParameter: max_supplement_questions
            mlflow_tracking_uri:
              runtimeValue:
                constant: http://mlflow.sridharproject.svc.cluster.local:5000
            model_version:
              taskOutputParameter:
                outputParameterKey: version
                producerTask: resolve-version
            question_bank_s3_path:
              runtimeValue:
                constant: s3://mlflow-artifacts/synthetic/kubeflow-qbank/questions.json
            s3_access_key:
              componentInputParameter: s3_access_key
            s3_endpoint:
              runtimeValue:
                constant: http://minio.sridharproject.svc.cluster.local:9000
            s3_secret_key:
              componentInputParameter: s3_secret_key
            sft_run_name_prefix:
              runtimeValue:
                constant: pipeline-eval-
            student_url:
              runtimeValue:
                constant: http://student-llm-predictor.sridharproject.svc.cluster.local:8080
        taskInfo:
          name: extract-preferences
      finetune:
        cachingOptions: {}
        componentRef:
          name: comp-finetune
        dependentTasks:
        - extract-gold-data
        - resolve-version
        inputs:
          parameters:
            base_model_id:
              runtimeValue:
                constant: unsloth/Llama-3.2-1B-Instruct
            gold_data_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: extract-gold-data
            model_output_s3_path:
              taskOutputParameter:
                outputParameterKey: model_output_path
                producerTask: resolve-version
            num_epochs:
              componentInputParameter: num_epochs
            s3_access_key:
              componentInputParameter: s3_access_key
            s3_endpoint:
              runtimeValue:
                constant: http://minio.sridharproject.svc.cluster.local:9000
            s3_secret_key:
              componentInputParameter: s3_secret_key
        taskInfo:
          name: finetune
      resolve-version:
        cachingOptions: {}
        componentRef:
          name: comp-resolve-version
        inputs:
          parameters:
            explicit_version:
              componentInputParameter: model_version
            gold_bucket:
              runtimeValue:
                constant: mlflow-artifacts
            model_bucket:
              runtimeValue:
                constant: sridhar-models
            model_prefix:
              runtimeValue:
                constant: student-1b-
            s3_access_key:
              componentInputParameter: s3_access_key
            s3_endpoint:
              runtimeValue:
                constant: http://minio.sridharproject.svc.cluster.local:9000
            s3_secret_key:
              componentInputParameter: s3_secret_key
        taskInfo:
          name: resolve-version
  inputDefinitions:
    parameters:
      dpo_beta:
        defaultValue: 0.1
        isOptional: true
        parameterType: NUMBER_DOUBLE
      dpo_epochs:
        defaultValue: 1.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      groq_api_key:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      groq_model:
        defaultValue: llama-3.3-70b-versatile
        isOptional: true
        parameterType: STRING
      max_supplement_questions:
        defaultValue: 50.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      min_dpo_pairs:
        defaultValue: 5.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      min_gold_threshold:
        defaultValue: 0.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      model_version:
        defaultValue: ''
        isOptional: true
        parameterType: STRING
      num_epochs:
        defaultValue: 3.0
        isOptional: true
        parameterType: NUMBER_INTEGER
      s3_access_key:
        defaultValue: minioadmin
        isOptional: true
        parameterType: STRING
      s3_secret_key:
        defaultValue: minioadmin123
        isOptional: true
        parameterType: STRING
schemaVersion: 2.1.0
sdkVersion: kfp-2.16.0
