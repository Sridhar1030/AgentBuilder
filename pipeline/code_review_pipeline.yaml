          \    print(\"EVALUATE MODEL STEP\")\n    print(\"=\" * 60)\n    print(f\"\
          \  Student URL:   {student_url}\")\n    print(f\"  Teacher API:   {api_url}\"\
          )\n    print(f\"  Teacher model: {teacher_model}\")\n    print(f\"  Model\
          \ version: {model_version}\")\n    print(f\"  Questions:     {len(test_questions)}\"\
          )\n    print(f\"  MLflow URI:    {mlflow_tracking_uri or '(not set)'}\"\
          )\n    print(\"=\" * 60)\n\n    GRADING_PROMPT = (\n        \"You are an\
          \ expert code review grader. Rate the following AI-generated code review\
          \ \"\n        \"on a scale of 1 to 10 based on these criteria:\\n\"\n  \
          \      \"- Issue identification: Did it find the real problem (not a hallucinated\
