#    teacher_api_key: str [Default: '']
#    teacher_api_url: str [Default: 'http://ollama.sridharproject.svc.cluster.local:11434']
#    teacher_model: str [Default: 'qwen2.5-coder:7b-instruct-q4_K_M']
