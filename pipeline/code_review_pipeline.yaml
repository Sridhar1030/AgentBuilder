          n\"\n        \"- Actionability: Is the suggestion concrete and implementable?\\\
          n\"\n        \"- Severity accuracy: Is the severity rating appropriate?\\\
          n\"\n        \"- False positive avoidance: Did it avoid flagging non-issues?\\\
          n\"\n        \"A score of 1 means completely wrong or hallucinated issues.\
          \ \"\n        \"A score of 10 means a perfect, reviewer-quality response.\\\
          n\"\n        'Respond with ONLY a JSON object: {\"score\": <number>, \"\
          reason\": \"<brief reason>\"}'\n    )\n\n    def query_student(question:\
          \ str, max_retries: int = 10) -> str:\n        for attempt in range(max_retries):\n\
          \            try:\n                resp = requests.post(\n             \
          \       f\"{student_url}/v1/chat/completions\",\n                    json={\n\
          \                        \"model\": \"/mnt/models\",\n                 \
          \       \"messages\": [{\"role\": \"user\", \"content\": question}],\n \
          \                       \"max_tokens\": 256,\n                        \"\
          temperature\": 0.3,\n                    },\n                    timeout=90,\n\
          \                )\n                if resp.status_code in (404, 503):\n\
          \                    wait = min(15 * (attempt + 1), 60)\n              \
          \      print(f\"  [{attempt+1}/{max_retries}] HTTP {resp.status_code}, vLLM\
