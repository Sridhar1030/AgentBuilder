    exec-merge-preferences:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - merge_preferences
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'boto3'  && \
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef merge_preferences(\n    pipeline_pref_path: str,\n    human_feedback_path:\
          \ str,\n    gold_data_path: str,\n    s3_endpoint: str,\n    s3_access_key:\
          \ str,\n    s3_secret_key: str,\n    bucket: str = \"mlflow-artifacts\"\
          ,\n    static_bank_key: str = \"preferences/static-bank/preference-bank.jsonl\"\
          ,\n    static_bank_sample_size: int = 300,\n    sft_mix_ratio: float = 0.15,\n\
          ) -> str:\n    \"\"\"Merge static bank (sampled), live pipeline, human feedback,\
          \ and SFT regularization pairs.\"\"\"\n    import json\n    import random\n\
          \    import re\n    import uuid\n\n    import boto3\n\n    random.seed(42)\n\
          \n    print(\"=\" * 60)\n    print(\"MERGE PREFERENCES STEP\")\n    print(\"\
          =\" * 60)\n    print(f\"  Static bank:     s3://{bucket}/{static_bank_key}\"\
          )\n    print(f\"  Sample size:     {static_bank_sample_size}\")\n    print(f\"\
          \  Pipeline prefs:  {pipeline_pref_path}\")\n    print(f\"  Human feedback:\
          \  {human_feedback_path or '(none)'}\")\n    print(f\"  Gold data:     \
          \  {gold_data_path or '(none)'}\")\n    print(f\"  SFT mix ratio:   {sft_mix_ratio}\"\
          )\n\n    s3 = boto3.client(\n        \"s3\",\n        endpoint_url=s3_endpoint,\n\
          \        aws_access_key_id=s3_access_key,\n        aws_secret_access_key=s3_secret_key,\n\
          \    )\n\n    all_pairs = []\n\n    def read_jsonl_from_s3(s3_path: str,\
          \ label: str) -> int:\n        if not s3_path:\n            print(f\"  {label}:\
          \ empty path, skipping\")\n            return 0\n        parts = s3_path.replace(\"\
          s3://\", \"\").split(\"/\", 1)\n        try:\n            obj = s3.get_object(Bucket=parts[0],\
          \ Key=parts[1])\n        except s3.exceptions.NoSuchKey:\n            print(f\"\
          \  {label}: key not found, skipping\")\n            return 0\n        lines\
          \ = [l for l in obj[\"Body\"].read().decode().strip().split(\"\\n\") if\
          \ l.strip()]\n        count = 0\n        for line in lines:\n          \
          \  pair = json.loads(line)\n            if pair.get(\"prompt\") and pair.get(\"\
          chosen\") and pair.get(\"rejected\"):\n                all_pairs.append(pair)\n\
          \                count += 1\n        print(f\"  {label}: {count} pairs\"\
          )\n        return count\n\n    # Source 1: Static pre-generated bank (sample\
          \ a subset)\n    static_count = 0\n    try:\n        obj = s3.get_object(Bucket=bucket,\
          \ Key=static_bank_key)\n        lines = [l for l in obj[\"Body\"].read().decode().strip().split(\"\
          \\n\") if l.strip()]\n        bank_pairs = []\n        for line in lines:\n\
          \            pair = json.loads(line)\n            if pair.get(\"prompt\"\
          ) and pair.get(\"chosen\") and pair.get(\"rejected\"):\n               \
          \ bank_pairs.append(pair)\n\n        print(f\"  Static bank total: {len(bank_pairs)}\
          \ pairs\")\n        if len(bank_pairs) > static_bank_sample_size:\n    \
          \        sampled = random.sample(bank_pairs, static_bank_sample_size)\n\
          \        else:\n            sampled = bank_pairs\n        all_pairs.extend(sampled)\n\
          \        static_count = len(sampled)\n        print(f\"  Static bank sampled:\
          \ {static_count} pairs\")\n    except Exception as e:\n        print(f\"\
          \  Static bank not found or error: {e}\")\n        print(f\"  (Run generate_preference_bank\
          \ job first to create it)\")\n\n    # Source 2: Live pipeline preferences\
          \ (student vs teacher)\n    pipeline_count = read_jsonl_from_s3(pipeline_pref_path,\
          \ \"Pipeline live prefs\")\n\n    # Source 3: Human feedback\n    human_count\
          \ = read_jsonl_from_s3(human_feedback_path, \"Human feedback\")\n\n    #\
          \ Source 4: SFT regularization data (prevents forgetting SFT task format)\n\
          \    # Takes gold SFT examples and reformats as DPO pairs:\n    #   chosen\
          \ = gold reviewer comment, rejected = generic unhelpful response\n    sft_mix_count\
          \ = 0\n    if gold_data_path:\n        try:\n            parts = gold_data_path.replace(\"\
          s3://\", \"\").split(\"/\", 1)\n            obj = s3.get_object(Bucket=parts[0],\
          \ Key=parts[1])\n            lines = [l for l in obj[\"Body\"].read().decode().strip().split(\"\
          \\n\") if l.strip()]\n\n            sft_records = []\n            for line\
          \ in lines:\n                rec = json.loads(line)\n                text\
          \ = rec.get(\"text\", \"\")\n                if not text:\n            \
          \        continue\n                sft_records.append(text)\n\n        \
          \    # Sample 15% of SFT data\n            dpo_pair_count = len(all_pairs)\
          \ if all_pairs else 300\n            mix_count = max(10, int(dpo_pair_count\
          \ * sft_mix_ratio))\n            if len(sft_records) > mix_count:\n    \
          \            sampled_sft = random.sample(sft_records, mix_count)\n     \
          \       else:\n                sampled_sft = sft_records\n\n           \
          \ generic_rejects = [\n                \"The code looks fine to me.\",\n\
          \                \"No issues found.\",\n                \"LGTM.\",\n   \
          \             \"This change is acceptable.\",\n                \"I don't\
          \ see any problems with this code.\",\n            ]\n\n            for\
          \ text in sampled_sft:\n                # Extract user message (the diff\
          \ prompt) and assistant message (the review)\n                user_match\
          \ = re.search(\n                    r\"<\\|im_start\\|>user\\n(.*?)<\\|im_end\\\
          |>\", text, re.DOTALL\n                )\n                asst_match = re.search(\n\
          \                    r\"<\\|im_start\\|>assistant\\n(.*?)<\\|im_end\\|>\"\
          , text, re.DOTALL\n                )\n                if user_match and\
          \ asst_match:\n                    prompt = user_match.group(1).strip()\n\
          \                    chosen = asst_match.group(1).strip()\n            \
          \        if len(chosen) > 20:\n                        all_pairs.append({\n\
          \                            \"prompt\": prompt,\n                     \
          \       \"chosen\": chosen,\n                            \"rejected\": random.choice(generic_rejects),\n\
          \                            \"source\": \"sft_regularization\",\n     \
          \                   })\n                        sft_mix_count += 1\n\n \
          \           print(f\"  SFT regularization: {sft_mix_count} pairs (from {len(sft_records)}\
          \ gold records)\")\n        except Exception as e:\n            print(f\"\
          \  SFT mixing failed: {e}\")\n\n    print(f\"\\n  Total merged: {len(all_pairs)}\
          \ pairs\")\n    print(f\"    Static bank: {static_count}\")\n    print(f\"\
          \    Pipeline:    {pipeline_count}\")\n    print(f\"    Human:       {human_count}\"\
          )\n    print(f\"    SFT mix:     {sft_mix_count}\")\n\n    if not all_pairs:\n\
          \        print(\"  No pairs to merge. Returning pipeline path as-is.\")\n\
          \        return pipeline_pref_path\n\n    random.shuffle(all_pairs)\n\n\
          \    run_id = uuid.uuid4().hex[:12]\n    out_key = f\"preferences/merged-{run_id}.jsonl\"\
          \n    body = \"\\n\".join(json.dumps(p) for p in all_pairs)\n    s3.put_object(Bucket=bucket,\
          \ Key=out_key, Body=body.encode())\n\n    out_path = f\"s3://{bucket}/{out_key}\"\
          \n    print(f\"  Wrote merged preferences to {out_path}\")\n    return out_path\n\
          \n"
        image: python:3.11-slim
    exec-resolve-version:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - resolve_version
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'boto3'  && \
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef resolve_version(\n    s3_endpoint: str,\n    s3_access_key: str,\n\
          \    s3_secret_key: str,\n    model_bucket: str,\n    model_prefix: str,\n\
          \    gold_bucket: str,\n    hf_base_model_id: str = \"Qwen/Qwen2.5-Coder-1.5B-Instruct\"\
          ,\n    explicit_version: str = \"\",\n) -> NamedTuple(\"VersionOutputs\"\
          , [(\"version\", str), (\"gold_data_path\", str), (\"model_output_path\"\
          , str), (\"prev_model_path\", str)]):\n    \"\"\"Find the latest student-1b-vN/\
          \ in MinIO and return vN+1 with paths.\"\"\"\n    import re\n    from collections\
          \ import namedtuple\n    import boto3\n\n    print(\"=\" * 60)\n    print(\"\
          RESOLVE VERSION STEP\")\n    print(\"=\" * 60)\n    print(f\"  Model bucket:\
          \ {model_bucket}\")\n    print(f\"  Model prefix: {model_prefix}\")\n  \
          \  print(f\"  Gold bucket:  {gold_bucket}\")\n    print(f\"  Explicit ver:\
          \ {explicit_version or '(auto)'}\")\n    print(\"=\" * 60)\n\n    s3 = boto3.client(\n\
          \        \"s3\",\n        endpoint_url=s3_endpoint,\n        aws_access_key_id=s3_access_key,\n\
          \        aws_secret_access_key=s3_secret_key,\n    )\n\n    paginator =\
          \ s3.get_paginator(\"list_objects_v2\")\n    version_numbers = []\n\n  \
          \  for page in paginator.paginate(Bucket=model_bucket, Prefix=model_prefix,\
          \ Delimiter=\"/\"):\n        for cp in page.get(\"CommonPrefixes\", []):\n\
          \            folder = cp[\"Prefix\"]\n            match = re.search(r\"\
          -v(\\d+)/?$\", folder)\n            if match:\n                version_numbers.append(int(match.group(1)))\n\
          \n    if explicit_version:\n        version = explicit_version\n       \
          \ print(f\"Using explicit version: {version}\")\n    elif version_numbers:\n\
          \        latest = max(version_numbers)\n        version = f\"v{latest +\
          \ 1}\"\n        print(f\"Found versions: {sorted(version_numbers)}. Latest:\
          \ v{latest}. Next: {version}\")\n    else:\n        version = \"v1\"\n \
          \       print(f\"No existing versions found under {model_bucket}/{model_prefix}.\
          \ Starting at {version}\")\n\n    if version_numbers:\n        prev_version\
          \ = max(version_numbers)\n        prev_model_path = f\"s3://{model_bucket}/{model_prefix}v{prev_version}/\"\
          \n        print(f\"Previous model: {prev_model_path} (iterative SFT will\
          \ start from here)\")\n    else:\n        prev_model_path = hf_base_model_id\n\
          \        print(f\"No previous model found -- SFT will start from HuggingFace\
          \ base: {hf_base_model_id}\")\n\n    gold_data_path = f\"s3://{gold_bucket}/gold/train-{version}.jsonl\"\
          \n    model_output_path = f\"s3://{model_bucket}/{model_prefix}{version}/\"\
          \n\n    print(f\"Version: {version}\")\n    print(f\"Gold data path: {gold_data_path}\"\
          )\n    print(f\"Model output path: {model_output_path}\")\n    print(f\"\
          Prev model path: {prev_model_path or '(none)'}\")\n\n    Outputs = namedtuple(\"\
          VersionOutputs\", [\"version\", \"gold_data_path\", \"model_output_path\"\
          , \"prev_model_path\"])\n    return Outputs(version=version, gold_data_path=gold_data_path,\
          \ model_output_path=model_output_path, prev_model_path=prev_model_path)\n\
          \n"
