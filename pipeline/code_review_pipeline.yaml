                outputParameterKey: Output
                producerTask: deploy-model-2
            teacher_api_key:
              componentInputParameter: teacher_api_key
            teacher_api_url:
              componentInputParameter: teacher_api_url
            teacher_model:
              componentInputParameter: teacher_model
            test_questions:
              runtimeValue:
                constant:
                - "Review the following code diff and identify any issues:\n\nFile:\
                  \ pkg/controller/job_controller.go\nLanguage: Go\n\n```diff\n@@\
                  \ -189,7 +189,7 @@\n func (p *Progress) buildProgressServerCaCrtConfigMap(ctx\
                  \ context.Context, trainJob *trainer.TrainJob) (*corev1ac.ConfigMapApplyConfiguration,\
                  \ error) {\n \tsecret := &corev1.Secret{}\n \tif err := p.client.Get(ctx,\
                  \ secretKey, secret); err == nil {\n \t\tif _, ok := secret.Data[\"\
                  ca.crt\"]; !ok {\n-\t\t\treturn nil, fmt.Errorf(\"ca.crt not found:\
                  \ %w\", err)\n+\t\t\treturn nil, fmt.Errorf(\"ca.crt not found in\
                  \ TLS secret\")\n \t\t}\n```"
                - 'Review the following code diff and identify any issues:


                  File: test/e2e/testdata/status_update.py

                  Language: Python


                  ```diff

                  @@ -0,0 +1,30 @@

                  +import os, urllib.request

                  +

                  +token = open(os.environ["KUBEFLOW_TRAINER_SERVER_TOKEN"]).read()

                  +req = urllib.request.Request(url, method="POST")

                  +req.add_header("Authorization", f"Bearer {token}")

                  ```'
                - "Review the following code diff and identify any issues:\n\nFile:\
                  \ pkg/webhooks/trainjob_webhook.go\nLanguage: Go\n\n```diff\n@@\
