# This rule is not used by the project distillation-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to distillation.rhoai.example.com resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: distillation-operator
    app.kubernetes.io/managed-by: kustomize
  name: distillationjob-viewer-role
rules:
- apiGroups:
  - distillation.rhoai.example.com
  resources:
  - distillationjobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - distillation.rhoai.example.com
  resources:
  - distillationjobs/status
  verbs:
  - get
