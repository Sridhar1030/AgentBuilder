          \            resp = requests.post(\n                api_url,\n         \
          \       headers=api_headers,\n                json={\n                 \
          \   \"model\": teacher_model,\n                    \"messages\": messages,\n\
          \                    \"max_tokens\": max_tokens,\n                    \"\
          temperature\": temperature,\n                },\n                timeout=300,\n\
          \            )\n            if resp.status_code == 429:\n              \
          \  wait = min(2 ** attempt * 5, 120)\n                print(f\"  [429] Rate\
          \ limited, waiting {wait}s (attempt {attempt+1}/8)\")\n                time.sleep(wait)\n\
          \                continue\n            resp.raise_for_status()\n       \
          \     return resp.json()[\"choices\"][0][\"message\"][\"content\"]\n   \
          \     resp.raise_for_status()\n        return \"\"\n\n    def query_teacher(question:\
          \ str) -> str:\n        return _teacher_call([\n            {\"role\": \"\
