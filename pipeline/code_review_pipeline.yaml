deploymentSpec:
  executors:
    exec-deploy-model:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes==32.0.1'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_model(\n    model_s3_path: str,\n    isvc_name: str,\n\
          \    namespace: str,\n) -> str:\n    \"\"\"Patch InferenceService storageUri\
          \ and wait for Ready.\"\"\"\n    import time\n    from kubernetes import\
          \ client, config\n\n    print(\"=\" * 60)\n    print(\"DEPLOY MODEL STEP\"\
          )\n    print(\"=\" * 60)\n    print(f\"  ISVC name:    {isvc_name}\")\n\
          \    print(f\"  Namespace:    {namespace}\")\n    print(f\"  Model path:\
          \   {model_s3_path}\")\n    print(\"=\" * 60)\n\n    config.load_incluster_config()\n\
          \n    custom_api = client.CustomObjectsApi()\n    group = \"serving.kserve.io\"\
          \n    version = \"v1beta1\"\n    plural = \"inferenceservices\"\n\n    storage_uri\
          \ = model_s3_path\n    if not storage_uri.startswith(\"s3://\"):\n     \
          \   storage_uri = f\"s3://{storage_uri}\"\n    if not storage_uri.endswith(\"\
          /\"):\n        storage_uri += \"/\"\n\n    patch_body = {\n        \"spec\"\
          : {\n            \"predictor\": {\n                \"model\": {\n      \
          \              \"storageUri\": storage_uri,\n                }\n       \
          \     }\n        }\n    }\n\n    print(f\"[{time.strftime('%H:%M:%S')}]\
          \ Patching {isvc_name} storageUri -> {storage_uri}\")\n    custom_api.patch_namespaced_custom_object(\n\
          \        group=group,\n        version=version,\n        namespace=namespace,\n\
          \        plural=plural,\n        name=isvc_name,\n        body=patch_body,\n\
          \    )\n\n    print(f\"[{time.strftime('%H:%M:%S')}] Patch applied. Waiting\
          \ 30s for rollout to begin...\")\n    time.sleep(30)\n\n    # Wait for the\
          \ ISVC to become Ready with the NEW storageUri (up to 10 min)\n    timeout\
          \ = 600\n    poll_interval = 15\n    elapsed = 0\n\n    while elapsed <\
          \ timeout:\n        isvc = custom_api.get_namespaced_custom_object(\n  \
          \          group=group,\n            version=version,\n            namespace=namespace,\n\
          \            plural=plural,\n            name=isvc_name,\n        )\n\n\
          \        # Confirm the storageUri was actually updated\n        current_uri\
          \ = (\n            isvc.get(\"spec\", {})\n            .get(\"predictor\"\
          , {})\n            .get(\"model\", {})\n            .get(\"storageUri\"\
          , \"\")\n        )\n        conditions = isvc.get(\"status\", {}).get(\"\
          conditions\", [])\n        ready = any(\n            c.get(\"type\") ==\
          \ \"Ready\" and c.get(\"status\") == \"True\"\n            for c in conditions\n\
          \        )\n\n        if ready and current_uri == storage_uri:\n       \
          \     url = isvc.get(\"status\", {}).get(\"url\", \"\")\n            print(f\"\
          [{time.strftime('%H:%M:%S')}] ISVC {isvc_name} is Ready: {url}\")\n    \
          \        svc_url = f\"http://{isvc_name}-predictor.{namespace}.svc.cluster.local:8080\"\
          \n            print(f\"[{time.strftime('%H:%M:%S')}] Internal URL: {svc_url}\"\
          )\n            print(f\"[{time.strftime('%H:%M:%S')}] Waiting 60s for vLLM\
          \ to fully load model into GPU...\")\n            time.sleep(60)\n     \
          \       print(f\"[{time.strftime('%H:%M:%S')}] Deploy complete.\")\n   \
          \         return svc_url\n\n        status_msg = f\"ready={ready}, storageUri\
          \ matches={current_uri == storage_uri}\"\n        print(f\"[{time.strftime('%H:%M:%S')}]\
          \ Waiting for {isvc_name}... ({elapsed}s/{timeout}s) [{status_msg}]\")\n\
          \        time.sleep(poll_interval)\n        elapsed += poll_interval\n\n\
          \    raise TimeoutError(\n        f\"InferenceService {isvc_name} did not\
          \ become Ready within {timeout}s\"\n    )\n\n"
        image: python:3.11-slim
    exec-deploy-model-2:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - deploy_model
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes==32.0.1'\
          \  &&  python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef deploy_model(\n    model_s3_path: str,\n    isvc_name: str,\n\
          \    namespace: str,\n) -> str:\n    \"\"\"Patch InferenceService storageUri\
          \ and wait for Ready.\"\"\"\n    import time\n    from kubernetes import\
          \ client, config\n\n    print(\"=\" * 60)\n    print(\"DEPLOY MODEL STEP\"\
          )\n    print(\"=\" * 60)\n    print(f\"  ISVC name:    {isvc_name}\")\n\
          \    print(f\"  Namespace:    {namespace}\")\n    print(f\"  Model path:\
          \   {model_s3_path}\")\n    print(\"=\" * 60)\n\n    config.load_incluster_config()\n\
          \n    custom_api = client.CustomObjectsApi()\n    group = \"serving.kserve.io\"\
          \n    version = \"v1beta1\"\n    plural = \"inferenceservices\"\n\n    storage_uri\
          \ = model_s3_path\n    if not storage_uri.startswith(\"s3://\"):\n     \
          \   storage_uri = f\"s3://{storage_uri}\"\n    if not storage_uri.endswith(\"\
          /\"):\n        storage_uri += \"/\"\n\n    patch_body = {\n        \"spec\"\
          : {\n            \"predictor\": {\n                \"model\": {\n      \
          \              \"storageUri\": storage_uri,\n                }\n       \
          \     }\n        }\n    }\n\n    print(f\"[{time.strftime('%H:%M:%S')}]\
          \ Patching {isvc_name} storageUri -> {storage_uri}\")\n    custom_api.patch_namespaced_custom_object(\n\
          \        group=group,\n        version=version,\n        namespace=namespace,\n\
          \        plural=plural,\n        name=isvc_name,\n        body=patch_body,\n\
          \    )\n\n    print(f\"[{time.strftime('%H:%M:%S')}] Patch applied. Waiting\
          \ 30s for rollout to begin...\")\n    time.sleep(30)\n\n    # Wait for the\
          \ ISVC to become Ready with the NEW storageUri (up to 10 min)\n    timeout\
          \ = 600\n    poll_interval = 15\n    elapsed = 0\n\n    while elapsed <\
          \ timeout:\n        isvc = custom_api.get_namespaced_custom_object(\n  \
          \          group=group,\n            version=version,\n            namespace=namespace,\n\
          \            plural=plural,\n            name=isvc_name,\n        )\n\n\
          \        # Confirm the storageUri was actually updated\n        current_uri\
          \ = (\n            isvc.get(\"spec\", {})\n            .get(\"predictor\"\
          , {})\n            .get(\"model\", {})\n            .get(\"storageUri\"\
          , \"\")\n        )\n        conditions = isvc.get(\"status\", {}).get(\"\
          conditions\", [])\n        ready = any(\n            c.get(\"type\") ==\
          \ \"Ready\" and c.get(\"status\") == \"True\"\n            for c in conditions\n\
          \        )\n\n        if ready and current_uri == storage_uri:\n       \
          \     url = isvc.get(\"status\", {}).get(\"url\", \"\")\n            print(f\"\
          [{time.strftime('%H:%M:%S')}] ISVC {isvc_name} is Ready: {url}\")\n    \
          \        svc_url = f\"http://{isvc_name}-predictor.{namespace}.svc.cluster.local:8080\"\
          \n            print(f\"[{time.strftime('%H:%M:%S')}] Internal URL: {svc_url}\"\
          )\n            print(f\"[{time.strftime('%H:%M:%S')}] Waiting 60s for vLLM\
          \ to fully load model into GPU...\")\n            time.sleep(60)\n     \
          \       print(f\"[{time.strftime('%H:%M:%S')}] Deploy complete.\")\n   \
          \         return svc_url\n\n        status_msg = f\"ready={ready}, storageUri\
          \ matches={current_uri == storage_uri}\"\n        print(f\"[{time.strftime('%H:%M:%S')}]\
          \ Waiting for {isvc_name}... ({elapsed}s/{timeout}s) [{status_msg}]\")\n\
          \        time.sleep(poll_interval)\n        elapsed += poll_interval\n\n\
          \    raise TimeoutError(\n        f\"InferenceService {isvc_name} did not\
          \ become Ready within {timeout}s\"\n    )\n\n"
        image: python:3.11-slim
    exec-dpo-finetune:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - dpo_finetune
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'kubernetes==31.0.0'\
          \ 'boto3'  &&  python3 -m pip install --quiet --no-warn-script-location\
          \ 'kfp==2.16.0' '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"\
          3.9\"' && \"$0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef dpo_finetune(\n    sft_model_s3_path: str,\n    pref_data_s3_path:\
          \ str,\n    model_version: str,\n    s3_endpoint: str,\n    s3_access_key:\
          \ str,\n    s3_secret_key: str,\n    num_epochs: int = 1,\n    batch_size:\
          \ int = 1,\n    learning_rate: float = 5e-5,\n    lora_r: int = 16,\n  \
          \  lora_alpha: int = 32,\n    dpo_beta: float = 0.1,\n    min_pairs: int\
          \ = 5,\n) -> str:\n    \"\"\"Create a PyTorchJob for multi-GPU DPO training.\"\
          \"\"\n    import time\n\n    import boto3\n    from kubernetes import client,\
          \ config\n\n    print(\"=\" * 60)\n    print(\"DPO FINE-TUNE STEP (PyTorchJob,\
          \ multi-GPU)\")\n    print(\"=\" * 60)\n    print(f\"  SFT model:    {sft_model_s3_path}\"\
          )\n    print(f\"  Pref data:    {pref_data_s3_path}\")\n    print(f\"  Version:\
          \      {model_version}\")\n    print(f\"  Epochs:       {num_epochs}\")\n\
          \    print(f\"  Batch size:   {batch_size}\")\n    print(f\"  LR:      \
          \     {learning_rate}\")\n    print(f\"  LoRA r/alpha: {lora_r}/{lora_alpha}\"\
          )\n    print(f\"  DPO beta:     {dpo_beta}\")\n    print(f\"  Min pairs:\
          \    {min_pairs}\")\n    print(\"=\" * 60)\n\n    model_output_s3_path =\
          \ f\"s3://sridhar-models/student-1b-{model_version}-dpo/\"\n\n    s3 = boto3.client(\n\
          \        \"s3\",\n        endpoint_url=s3_endpoint,\n        aws_access_key_id=s3_access_key,\n\
          \        aws_secret_access_key=s3_secret_key,\n    )\n\n    parts = pref_data_s3_path.replace(\"\
          s3://\", \"\").split(\"/\", 1)\n    obj = s3.get_object(Bucket=parts[0],\
          \ Key=parts[1])\n    lines = [l for l in obj[\"Body\"].read().decode().strip().split(\"\
          \\n\") if l.strip()]\n    num_pref_pairs = len(lines)\n\n    print(f\"[{time.strftime('%H:%M:%S')}]\
          \ Preference data has {num_pref_pairs} pairs (min required: {min_pairs})\"\
          )\n    if num_pref_pairs < min_pairs:\n        print(f\"[{time.strftime('%H:%M:%S')}]\
          \ SKIPPING DPO: only {num_pref_pairs} pairs (< {min_pairs}). Returning SFT\
          \ model.\")\n        return sft_model_s3_path\n    print(f\"[{time.strftime('%H:%M:%S')}]\
          \ Sufficient pairs. Proceeding with DPO training.\")\n\n    config.load_incluster_config()\n\
          \    custom_api = client.CustomObjectsApi()\n    core_api = client.CoreV1Api()\n\
          \n    namespace = \"sridharproject\"\n    job_name = f\"dpo-{int(time.time())}\"\
          \n    image = \"quay.io/rh-ee-srpillai/distillation-trainer:v0.9.0\"\n \
          \   num_gpus = 4\n\n    env_list = [\n        {\"name\": \"TRAINING_MODE\"\
          , \"value\": \"dpo\"},\n        {\"name\": \"PREF_DATA_PATH\", \"value\"\
          : pref_data_s3_path},\n        {\"name\": \"BASE_MODEL_ID\", \"value\":\
          \ sft_model_s3_path},\n        {\"name\": \"MODEL_OUTPUT_S3_PATH\", \"value\"\
          : model_output_s3_path},\n        {\"name\": \"NUM_EPOCHS\", \"value\":\
          \ str(num_epochs)},\n        {\"name\": \"BATCH_SIZE\", \"value\": str(batch_size)},\n\
          \        {\"name\": \"LEARNING_RATE\", \"value\": str(learning_rate)},\n\
          \        {\"name\": \"LORA_R\", \"value\": str(lora_r)},\n        {\"name\"\
          : \"LORA_ALPHA\", \"value\": str(lora_alpha)},\n        {\"name\": \"DPO_BETA\"\
          , \"value\": str(dpo_beta)},\n        {\"name\": \"S3_ENDPOINT\", \"value\"\
          : s3_endpoint},\n        {\"name\": \"S3_ACCESS_KEY\", \"value\": s3_access_key},\n\
          \        {\"name\": \"S3_SECRET_KEY\", \"value\": s3_secret_key},\n    ]\n\
          \n    pytorchjob = {\n        \"apiVersion\": \"kubeflow.org/v1\",\n   \
          \     \"kind\": \"PyTorchJob\",\n        \"metadata\": {\"name\": job_name,\
          \ \"namespace\": namespace},\n        \"spec\": {\n            \"pytorchReplicaSpecs\"\
          : {\n                \"Master\": {\n                    \"replicas\": 1,\n\
          \                    \"template\": {\n                        \"spec\":\
          \ {\n                            \"containers\": [{\n                  \
          \              \"name\": \"pytorch\",\n                                \"\
          image\": image,\n                                \"command\": [\"torchrun\"\
          ],\n                                \"args\": [\n                      \
          \              f\"--nproc_per_node={num_gpus}\",\n                     \
          \               \"--master_addr=localhost\",\n                         \
          \           \"--master_port=29500\",\n                                 \
          \   \"/opt/scripts/finetune_job.py\",\n                                ],\n\
          \                                \"env\": env_list,\n                  \
          \              \"resources\": {\n                                    \"\
          requests\": {\n                                        \"nvidia.com/gpu\"\
          : str(num_gpus),\n                                        \"memory\": \"\
          48Gi\",\n                                        \"cpu\": \"8\",\n     \
          \                               },\n                                   \
          \ \"limits\": {\n                                        \"nvidia.com/gpu\"\
          : str(num_gpus),\n                                        \"memory\": \"\
          64Gi\",\n                                        \"cpu\": \"16\",\n    \
          \                                },\n                                },\n\
          \                                \"volumeMounts\": [{\"name\": \"dshm\"\
          , \"mountPath\": \"/dev/shm\"}],\n                            }],\n    \
          \                        \"volumes\": [{\"name\": \"dshm\", \"emptyDir\"\
          : {\"medium\": \"Memory\", \"sizeLimit\": \"8Gi\"}}],\n                \
