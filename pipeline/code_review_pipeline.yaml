          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef extract_code_review_gold(\n    s3_endpoint: str,\n    s3_access_key:\
          \ str,\n    s3_secret_key: str,\n    synthetic_bucket: str,\n    synthetic_prefix:\
          \ str,\n    output_s3_path: str,\n) -> str:\n    \"\"\"Read pre-built code\
          \ review training JSONL from MinIO.\n\n    Unlike the generic extract_gold,\
          \ this component reads JSONL files\n    that already have a `text` field\
          \ in ChatML format, so no instruction/output\n    parsing is needed.\n \
          \   \"\"\"\n    import json\n    import random\n    import boto3\n\n   \
          \ print(\"=\" * 60)\n    print(\"EXTRACT CODE REVIEW GOLD DATA STEP\")\n\
          \    print(\"=\" * 60)\n    print(f\"  Source:  s3://{synthetic_bucket}/{synthetic_prefix}\"\
          )\n    print(f\"  Output:  {output_s3_path}\")\n    print(\"=\" * 60)\n\n\
          \    s3 = boto3.client(\n        \"s3\",\n        endpoint_url=s3_endpoint,\n\
          \        aws_access_key_id=s3_access_key,\n        aws_secret_access_key=s3_secret_key,\n\
          \    )\n\n    records = []\n    paginator = s3.get_paginator(\"list_objects_v2\"\
          )\n\n    for page in paginator.paginate(Bucket=synthetic_bucket, Prefix=synthetic_prefix):\n\
          \        for item in page.get(\"Contents\", []):\n            key = item[\"\
          Key\"]\n            if not key.endswith(\".jsonl\"):\n                continue\n\
          \            try:\n                body = s3.get_object(Bucket=synthetic_bucket,\
          \ Key=key)[\"Body\"].read().decode(\"utf-8\")\n                for line\
          \ in body.strip().splitlines():\n                    line = line.strip()\n\
          \                    if not line:\n                        continue\n  \
          \                  record = json.loads(line)\n                    if not\
          \ record.get(\"text\"):\n                        continue\n            \
          \        records.append(record)\n            except Exception as exc:\n\
          \                print(f\"Warning: skipping {key}: {exc}\")\n\n    print(f\"\
          Loaded {len(records)} training records from s3://{synthetic_bucket}/{synthetic_prefix}\"\
          )\n\n    if len(records) > 1:\n        random.shuffle(records)\n\n    out_parts\
          \ = output_s3_path.replace(\"s3://\", \"\").split(\"/\", 1)\n    out_bucket,\
          \ out_key = out_parts[0], out_parts[1]\n    body = \"\\n\".join(json.dumps(r)\
          \ for r in records)\n    s3.put_object(Bucket=out_bucket, Key=out_key, Body=body.encode())\n\
          \    print(f\"Uploaded {len(records)} gold records to {output_s3_path}\"\
          )\n\n    return output_s3_path\n\n"
