          ])\n            mlflow.log_dict({\"results\": results}, \"eval_results.json\"\
          )\n        print(f\"MLflow run logged to {mlflow_tracking_uri}\")\n    else:\n\
          \        print(\"mlflow_tracking_uri not set -- skipping MLflow logging\"\
