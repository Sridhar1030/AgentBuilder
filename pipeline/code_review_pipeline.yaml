pipelineInfo:
  description: 'Code Review SLM: SFT + DPO distillation on Go/Python/K8s code diffs
    using Qwen2.5-Coder-1.5B.'
  name: code-review-slm
root:
  dag:
    tasks:
      deploy-model:
        cachingOptions: {}
        componentRef:
          name: comp-deploy-model
        dependentTasks:
        - finetune
        inputs:
          parameters:
            isvc_name:
              runtimeValue:
                constant: code-review-llm
            model_s3_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: finetune
            namespace:
              runtimeValue:
                constant: sridharproject
        taskInfo:
          name: deploy-model
      deploy-model-2:
        cachingOptions: {}
        componentRef:
          name: comp-deploy-model-2
        dependentTasks:
        - dpo-finetune
        inputs:
          parameters:
            isvc_name:
              runtimeValue:
                constant: code-review-llm
            model_s3_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: dpo-finetune
            namespace:
              runtimeValue:
                constant: sridharproject
        taskInfo:
          name: deploy-model-2
      dpo-finetune:
        cachingOptions: {}
        componentRef:
          name: comp-dpo-finetune
        dependentTasks:
        - extract-preferences
        - finetune
        - resolve-version
        inputs:
          parameters:
            dpo_beta:
              componentInputParameter: dpo_beta
            min_pairs:
              componentInputParameter: min_dpo_pairs
            model_version:
              taskOutputParameter:
                outputParameterKey: version
                producerTask: resolve-version
            num_epochs:
              componentInputParameter: dpo_epochs
            pref_data_s3_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: extract-preferences
            s3_access_key:
              componentInputParameter: s3_access_key
            s3_endpoint:
              runtimeValue:
                constant: http://minio.sridharproject.svc.cluster.local:9000
            s3_secret_key:
              componentInputParameter: s3_secret_key
            sft_model_s3_path:
              taskOutputParameter:
                outputParameterKey: Output
                producerTask: finetune
        taskInfo:
          name: dpo-finetune
      evaluate:
        cachingOptions: {}
        componentRef:
          name: comp-evaluate
        dependentTasks:
        - deploy-model-2
        - resolve-version
        inputs:
          parameters:
            mlflow_tracking_uri:
              runtimeValue:
                constant: http://mlflow.sridharproject.svc.cluster.local:5000
            model_version:
              taskOutputParameter:
                outputParameterKey: version
                producerTask: resolve-version
            s3_access_key:
              componentInputParameter: s3_access_key
            s3_endpoint:
              runtimeValue:
                constant: http://minio.sridharproject.svc.cluster.local:9000
            s3_secret_key:
              componentInputParameter: s3_secret_key
            student_url:
