apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: distillation-operator-dsp-access
rules:
- apiGroups:
  - datasciencepipelinesapplications.opendatahub.io
  resources:
  - datasciencepipelinesapplications
  - datasciencepipelinesapplications/api
  verbs:
  - get
  - list
  - create
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: distillation-operator-dsp-access
  namespace: sridharproject
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: distillation-operator-dsp-access
subjects:
- kind: ServiceAccount
  name: distillation-operator-controller-manager
  namespace: distillation-operator-system
