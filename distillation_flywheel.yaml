          \        aws_access_key_id=s3_access_key,\n        aws_secret_access_key=s3_secret_key,\n\
          \    )\n\n    def groq_call(messages: list, max_tokens: int = 512, temperature:\
          \ float = 0.7) -> str:\n        for attempt in range(8):\n            resp\
