    exec-extract-gold-data:
      container:
        args:
        - --executor_input
        - '{{$}}'
        - --function_to_execute
        - extract_gold_data
        command:
        - sh
        - -c
        - "\nif ! [ -x \"$(command -v pip)\" ]; then\n    python3 -m ensurepip ||\
          \ python3 -m ensurepip --user || apt-get install python3-pip\nfi\n\nPIP_DISABLE_PIP_VERSION_CHECK=1\
          \ python3 -m pip install --quiet --no-warn-script-location 'boto3'  && \
          \ python3 -m pip install --quiet --no-warn-script-location 'kfp==2.16.0'\
          \ '--no-deps' 'typing-extensions>=3.7.4,<5; python_version<\"3.9\"' && \"\
          $0\" \"$@\"\n"
        - sh
        - -ec
        - 'program_path=$(mktemp -d)


          printf "%s" "$0" > "$program_path/ephemeral_component.py"

          _KFP_RUNTIME=true python3 -m kfp.dsl.executor_main                         --component_module_path                         "$program_path/ephemeral_component.py"                         "$@"

          '
        - "\nimport kfp\nfrom kfp import dsl\nfrom kfp.dsl import *\nfrom typing import\
          \ *\n\ndef extract_gold_data(\n    s3_endpoint: str,\n    s3_access_key:\
          \ str,\n    s3_secret_key: str,\n    teacher_bucket: str,\n    teacher_prefix:\
          \ str,\n    synthetic_bucket: str,\n    synthetic_prefix: str,\n    cursor_key:\
          \ str,\n    output_s3_path: str,\n    min_threshold: int = 0,\n) -> str:\n\
          \    \"\"\"Read teacher interactions (incremental) and synthetic data from\
          \ MinIO, write merged gold JSONL.\"\"\"\n    import json\n    import random\n\
          \    import boto3\n\n    s3 = boto3.client(\n        \"s3\",\n        endpoint_url=s3_endpoint,\n\
          \        aws_access_key_id=s3_access_key,\n        aws_secret_access_key=s3_secret_key,\n\
          \    )\n\n    # 1. Read cursor\n    last_ts = 0.0\n    try:\n        obj\
          \ = s3.get_object(Bucket=teacher_bucket, Key=cursor_key)\n        cursor_data\
          \ = json.loads(obj[\"Body\"].read().decode(\"utf-8\"))\n        last_ts\
          \ = float(cursor_data.get(\"last_processed_timestamp\", 0))\n        print(f\"\
          Cursor loaded: last_processed_timestamp={last_ts}\")\n    except s3.exceptions.NoSuchKey:\n\
          \        print(\"No cursor found -- processing all teacher interactions.\"\
          )\n    except Exception as exc:\n        print(f\"Warning: could not read\
          \ cursor: {exc}. Processing all teacher interactions.\")\n\n    # 2. List\
          \ and read teacher interactions (incremental)\n    teacher_pairs = []\n\
          \    max_ts = last_ts\n    paginator = s3.get_paginator(\"list_objects_v2\"\
          )\n\n    for page in paginator.paginate(Bucket=teacher_bucket, Prefix=teacher_prefix):\n\
          \        for item in page.get(\"Contents\", []):\n            key = item[\"\
          Key\"]\n            if key.endswith(\".cursor.json\") or key == teacher_prefix:\n\
          \                continue\n            try:\n                body = s3.get_object(Bucket=teacher_bucket,\
          \ Key=key)[\"Body\"].read().decode(\"utf-8\")\n                record =\
          \ json.loads(body)\n                ts = float(record.get(\"timestamp\"\
          , 0))\n                if ts <= last_ts:\n                    continue\n\
          \n                instr = record.get(\"instruction\", \"\").strip()\n  \
          \              outp = record.get(\"output\", \"\").strip()\n           \
          \     if not instr or not outp:\n                    continue\n\n      \
          \          text = record.get(\"text\") or f\"### Instruction:\\n{instr}\\\
          n\\n### Response:\\n{outp}\"\n                teacher_pairs.append({\n \
          \                   \"instruction\": instr,\n                    \"output\"\
          : outp,\n                    \"text\": text,\n                })\n     \
          \           if ts > max_ts:\n                    max_ts = ts\n         \
          \   except Exception as exc:\n                print(f\"Warning: skipping\
          \ {key}: {exc}\")\n\n    teacher_pairs.sort(key=lambda p: p[\"instruction\"\
          ])\n    print(f\"Teacher: {len(teacher_pairs)} new interactions (since ts={last_ts})\"\
          )\n\n    # 3. Read synthetic data (all objects under synthetic prefix)\n\
          \    synthetic_pairs = []\n    for page in paginator.paginate(Bucket=synthetic_bucket,\
          \ Prefix=synthetic_prefix):\n        for item in page.get(\"Contents\",\
          \ []):\n            key = item[\"Key\"]\n            if key == synthetic_prefix:\n\
          \                continue\n            try:\n                body = s3.get_object(Bucket=synthetic_bucket,\
          \ Key=key)[\"Body\"].read().decode(\"utf-8\")\n                for line\
          \ in body.strip().splitlines():\n                    line = line.strip()\n\
          \                    if not line:\n                        continue\n  \
          \                  record = json.loads(line)\n                    instr\
          \ = record.get(\"instruction\", \"\").strip()\n                    outp\
          \ = record.get(\"output\", \"\").strip()\n                    if not instr\
          \ or not outp:\n                        continue\n                    text\
          \ = record.get(\"text\") or f\"### Instruction:\\n{instr}\\n\\n### Response:\\\
          n{outp}\"\n                    synthetic_pairs.append({\n              \
          \          \"instruction\": instr,\n                        \"output\":\
          \ outp,\n                        \"text\": text,\n                    })\n\
          \            except Exception as exc:\n                print(f\"Warning:\
          \ skipping synthetic {key}: {exc}\")\n\n    print(f\"Synthetic: {len(synthetic_pairs)}\
          \ pairs\")\n\n    # 4. Merge, shuffle, and write gold\n    gold_pairs =\
          \ teacher_pairs + synthetic_pairs\n    total = len(gold_pairs)\n    print(f\"\
          Total pairs: {total} (teacher={len(teacher_pairs)}, synthetic={len(synthetic_pairs)})\"\
          )\n\n    if total > 1:\n        random.shuffle(gold_pairs)\n\n    if min_threshold\
          \ and total < min_threshold:\n        raise RuntimeError(f\"Only {total}\
          \ pairs found, below threshold {min_threshold}\")\n\n    out_parts = output_s3_path.replace(\"\
          s3://\", \"\").split(\"/\", 1)\n    out_bucket, out_key = out_parts[0],\
          \ out_parts[1]\n    body = \"\\n\".join(json.dumps(p) for p in gold_pairs)\n\
          \n    s3.put_object(Bucket=out_bucket, Key=out_key, Body=body.encode())\n\
          \    print(f\"Uploaded {total} gold pairs to {output_s3_path}\")\n\n   \
          \ # 5. Advance cursor\n    if max_ts > last_ts:\n        cursor_body = json.dumps({\"\
          last_processed_timestamp\": max_ts})\n        s3.put_object(\n         \
          \   Bucket=teacher_bucket,\n            Key=cursor_key,\n            Body=cursor_body.encode(),\n\
          \            ContentType=\"application/json\",\n        )\n        print(f\"\
          Cursor advanced to {max_ts}\")\n    else:\n        print(\"Cursor unchanged\
          \ (no new teacher interactions).\")\n\n    return output_s3_path\n\n"
