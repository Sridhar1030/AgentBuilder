          [{time.strftime('%H:%M:%S')}] Could not fetch job status ({e}), will retry...\"\
          )\n                continue\n\n            conditions = job.get(\"status\"\
          , {}).get(\"conditions\", [])\n            for c in conditions:\n      \
          \          ctype = c.get(\"type\")\n                if ctype == \"Succeeded\"\
          \ and c.get(\"status\") == \"True\":\n                    hrs, rem = divmod(elapsed,\
          \ 3600)\n                    mins = rem // 60\n                    print(f\"\
          [{time.strftime('%H:%M:%S')}] PyTorchJob {job_name} succeeded ({hrs}h{mins}m)\"\
          )\n                    result = model_output_s3_path\n                 \
          \   return result\n                if ctype == \"Failed\" and c.get(\"status\"\
          ) == \"True\":\n                    job_failed = True\n                \
          \    fail_msg = c.get(\"message\", \"unknown error\")\n                \
          \    print(f\"[{time.strftime('%H:%M:%S')}] SFT job {job_name} status=Failed.\
          \ Continuing to poll S3 for model upload...\")\n                    break\n\
          \n            if not job_failed:\n                hrs, rem = divmod(elapsed,\
          \ 3600)\n                mins = rem // 60\n                print(f\"[{time.strftime('%H:%M:%S')}]\
          \ PyTorchJob {job_name} running (elapsed={hrs}h{mins}m)\")\n\n        if\
          \ job_failed:\n            try:\n                pods = core_api.list_namespaced_pod(\n\
          \                    namespace=namespace,\n                    label_selector=f\"\
          training.kubeflow.org/job-name={job_name}\",\n                )\n      \
          \          if pods.items:\n                    pod_name = pods.items[0].metadata.name\n\
          \                    logs = core_api.read_namespaced_pod_log(\n        \
          \                name=pod_name, namespace=namespace, tail_lines=100,\n \
          \                   )\n                    fail_msg = f\"{fail_msg}\\n\\\
          n--- Pod {pod_name} logs ---\\n{logs}\"\n            except Exception as\
          \ e:\n                fail_msg = f\"{fail_msg} (could not fetch pod logs:\
          \ {e})\"\n            raise RuntimeError(f\"PyTorchJob {job_name} failed\
          \ and model never appeared in S3: {fail_msg}\")\n\n        raise TimeoutError(f\"\
          PyTorchJob {job_name} did not complete within {timeout}s\")\n    finally:\n\
          \        print(f\"[{time.strftime('%H:%M:%S')}] SFT step done. Restoring\
          \ KServe student model...\")\n        _restore_kserve()\n\n"
